<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- ファビコン -->
    <link rel="icon" type="image/svg+xml" href="/digilog-icon.svg" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0e1a" />
    <!-- iOS ホーム画面追加用 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DigiLog" />
    <link rel="apple-touch-icon" href="/digilog-icon.svg" />
    <!-- OGP（SNSシェア用） -->
    <meta property="og:title" content="DigiLog - Battle Tracker" />
    <meta property="og:description" content="Digimon TCG 対戦記録アプリ" />
    <meta property="og:image" content="/digilog-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DigiLog</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        /* ステータスバー背景をアプリと同じ紺色に */
        background-color: #0a0e1a;
      }
      #root {
        width: 100%;
        min-height: 100vh;
        /* セーフエリア分だけ上にパディング */
        padding-top: env(safe-area-inset-top);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
